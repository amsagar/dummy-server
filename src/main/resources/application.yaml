spring:
  application:
    name: pods-ai-agent
  mvc:
    async:
      # Do not auto-timeout streaming chat responses while model is still generating.
      request-timeout: -1
  autoconfigure:
    exclude:
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
  datasource:
    url: jdbc:postgresql://ep-little-bird-apd16p3k-pooler.c-7.us-east-1.aws.neon.tech:5432/pods_ai
    username: neondb_owner
    password: npg_u8zSPQ2TtYpw
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      api-key: "dummy-key"
    azure:
      openai:
        endpoint: "https://dummy-endpoint.openai.azure.com/"
        api-key: "dummy-key"
    anthropic:
      api-key: "dummy-key"
    ollama:
      base-url: "http://localhost:11434"
pods:
  auth:
    jwt-secret: "pods-agent-jwt-secret-key-change-in-production-123456789012345"
    jwt-expiration-ms: 86400000
  encryption:
    key: "d13b66074da5bb8e7db8a52c4a968e813a8407fee56d5549f932e4c1e80e0355"
  models:
    allowed-providers: openai, azure, azure_openai, azure_claude, anthropic, google-vertex, ollama
  runtime:
    enable-anthropic-thinking: true
    base-only-default-tool-injection-enabled: true
    dynamic-tool-exposure-enabled: true
    tool-shortlist-default-size: 24
    tool-shortlist-expanded-size: 48
    tool-memory-bias-weight: 0.2
    tool-shortlist-fallback-to-all-on-miss: true
    catalog-search-candidate-limit: 40
    dynamic-skill-exposure-enabled: true
    skill-shortlist-default-size: 6
    skill-shortlist-expanded-size: 4
    skill-memory-bias-weight: 0.2
    skill-shortlist-fallback-to-catalog-on-miss: true
    quality-expansion-max-retries: 1
    max-tool-callbacks-per-turn: 120
    tool-output-vfs-spill-threshold-chars: 16384
    # Tool diagnostics logging mode:
    # - metadata: structured summaries only
    # - full_nonprod_debug: full payloads only when DEBUG and non-prod
    # - full: full payloads everywhere
    tool-io-log-mode: full_nonprod_debug
    runtime-environment: dev
    max-output-tokens: 8192
    code-execution-default-timeout-ms: 3000
    code-execution-max-timeout-ms: 15000
    code-execution-default-memory-limit-mb: 64
    code-execution-max-memory-limit-mb: 256
    # Azure SDK default response timeout is 60s, which is too tight for
    # reasoning models (gpt-5, o-series) inside agentic tool loops where
    # one turn may include tool-result ingestion + chain-of-thought + the
    # next tool call. 5 minutes lets long turns finish without giving up
    # on a genuinely stuck request.
    azure-response-timeout-ms: 300000
    summary-token-threshold: 6000
    auto-routing-low-threshold: 400
    auto-routing-medium-threshold: 1400
    tool-auto-pick-min-score: 30
    tool-auto-pick-ambiguity-delta: 10
    tool-loop-max-steps: 4
    worker-task-timeout-ms: 20000
    summary-retain-recent-messages: 16
    context-window-utilization-percent: 85
    min-history-messages-to-keep: 12
    enable-prompt-window-guard: true
    include-skill-content-in-system-prompt: true
    max-skill-content-chars: 12000
    max-skill-files-per-skill: 6
    enable-message-sanitization: true
    enable-budget-hints: true
    budget-hint-warn-percent: 80
    budget-hint-elevated-percent: 70
    budget-hint-critical-percent: 85
    enable-anthropic-prompt-caching-hints: false
    anthropic-chars-per-token: 3.5
    open-ai-chars-per-token: 4.0
    ollama-chars-per-token: 4.2
    # Keep skills in system prompt catalog; load full content only via `skill` tool calls.
    include-full-skill-files: false
    include-mcp-prompt-hints: false
    strict-scope-only: true
    allow-capabilities-queries: true
    out-of-scope-refusal-message: "I can’t answer this because it is outside my allowed skills/tools scope."
    strict-scope:
      pre-flight-enabled: true
      min-top-tool-cosine: 0.30
      allow-conversational-max-words: 3
    persist-internal-events: false
    enable-experimental-tools: true
    enabled-experimental-tool-names: [ ]
    allowed-permission-scopes: [ filesystem, shell, web, memory, integration, http_proxy ]
    # Observe during staged rollout:
    # - tool-match precision
    # - low-signal tool result rate
    # - clarification rate
    # - end-to-end latency and prompt token usage
  skills:
    blob:
      connection-string: "DefaultEndpointsProtocol=https;AccountName=openfga;AccountKey=3qRPjRUAleZDRiDuHaZxCcrPFLAABAeLK/lSIuIDPTTo1CBgnzFIg+TvPvynr1sL5EtL7aIofTix+AStN2labg==;EndpointSuffix=core.windows.net"
      container: "ai-skills"
      allow-in-memory-fallback: false
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:3001"
      - "http://localhost:5173"
      - "http://localhost:5174"
    allowed-methods:
      - GET
      - POST
      - PATCH
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers: [ ]
    allow-credentials: false
    max-age: 3600
    path-pattern: "/api/**"
  mcp:
    oauth:
      default-client-id: ""
      default-client-secret: ""
      default-redirect-uri: "http://localhost:5173/oauth2/callback"
      default-scopes: ""
      default-authorization-url: ""
      default-token-url: ""
logging:
  level:
    root: INFO
    com.pods.agent: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
server:
  compression:
    enabled: false
