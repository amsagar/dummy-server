MEMORY.DELETE=DELETE FROM agent.memories WHERE id = :id AND user_id = :userId
MEMORY.DELETE_BY_USER=DELETE FROM agent.memories WHERE user_id = :userId
MEMORY.FIND_BY_ID=SELECT * FROM agent.memories WHERE id = :id AND user_id = :userId
MEMORY.FIND_BY_USER=SELECT * FROM agent.memories WHERE user_id = :userId ORDER BY updated_at DESC
