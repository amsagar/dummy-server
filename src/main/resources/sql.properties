CHAT_SESSION.INSERT=INSERT INTO agent.chat_sessions (session_id, user_id, created_at, last_active, timezone, title) VALUES (:sessionId, :userId, :createdAt, :lastActive, :timezone, :title) ON CONFLICT (session_id) DO NOTHING
CHAT_SESSION.FIND_BY_ID=SELECT * FROM agent.chat_sessions WHERE session_id = ?
CHAT_SESSION.FIND_BY_USER_AND_ID=SELECT * FROM agent.chat_sessions WHERE session_id = :sessionId AND user_id = :userId
CHAT_SESSION.FIND_ALL=SELECT * FROM agent.chat_sessions WHERE session_id NOT LIKE 'toolchain-config-%' ORDER BY last_active DESC LIMIT ? OFFSET ?
CHAT_SESSION.FIND_ALL_BY_USER=SELECT * FROM agent.chat_sessions WHERE user_id = :userId AND session_id NOT LIKE 'toolchain-config-%' ORDER BY last_active DESC LIMIT :limit OFFSET :offset
CHAT_SESSION.COUNT_ALL_BY_USER=SELECT COUNT(*) FROM agent.chat_sessions WHERE user_id = :userId AND session_id NOT LIKE 'toolchain-config-%'
CHAT_SESSION.UPDATE_LAST_ACTIVE=UPDATE agent.chat_sessions SET last_active = :lastActive WHERE session_id = :sessionId AND user_id = :userId
CHAT_SESSION.UPDATE_TITLE=UPDATE agent.chat_sessions SET title = :title WHERE session_id = :sessionId AND user_id = :userId AND title IS NULL
CHAT_SESSION.RENAME_TITLE=UPDATE agent.chat_sessions SET title = :title WHERE session_id = :sessionId AND user_id = :userId
CHAT_SESSION.ARCHIVE=UPDATE agent.chat_sessions SET archived_at = :archivedAt WHERE session_id = :sessionId AND user_id = :userId
CHAT_SESSION.FIND_ALL_ACTIVE=SELECT * FROM agent.chat_sessions WHERE user_id = :userId AND archived_at IS NULL AND session_id NOT LIKE 'toolchain-config-%' ORDER BY last_active DESC LIMIT :limit OFFSET :offset
CHAT_SESSION.FIND_ALL_ARCHIVED=SELECT * FROM agent.chat_sessions WHERE user_id = :userId AND archived_at IS NOT NULL AND session_id NOT LIKE 'toolchain-config-%' ORDER BY archived_at DESC LIMIT :limit OFFSET :offset
CHAT_SESSION.COUNT_ALL_ACTIVE=SELECT COUNT(*) FROM agent.chat_sessions WHERE user_id = :userId AND archived_at IS NULL AND session_id NOT LIKE 'toolchain-config-%'
CHAT_SESSION.COUNT_ALL_ARCHIVED=SELECT COUNT(*) FROM agent.chat_sessions WHERE user_id = :userId AND archived_at IS NOT NULL AND session_id NOT LIKE 'toolchain-config-%'
CHAT_SESSION.DELETE=DELETE FROM agent.chat_sessions WHERE session_id = :sessionId AND user_id = :userId
CHAT_SESSION.COUNT=SELECT COUNT(*) FROM agent.chat_sessions

CHAT_MESSAGE.INSERT=INSERT INTO agent.chat_messages (id, session_id, role, content, turn_id, created_at) VALUES (:id, :sessionId, :role, :content, :turnId, :createdAt)
CHAT_MESSAGE.FIND_BY_SESSION=SELECT * FROM agent.chat_messages WHERE session_id = ? ORDER BY created_at ASC
CHAT_MESSAGE.FIND_BY_SESSION_PAGED=SELECT * FROM agent.chat_messages WHERE session_id = :sessionId ORDER BY created_at ASC LIMIT :limit OFFSET :offset
CHAT_MESSAGE.COUNT_BY_SESSION=SELECT COUNT(*) FROM agent.chat_messages WHERE session_id = :sessionId
CHAT_MESSAGE.DELETE_BY_SESSION=DELETE FROM agent.chat_messages WHERE session_id = ?
CHAT_MESSAGE.FIND_BY_ID=SELECT * FROM agent.chat_messages WHERE id = ?
CHAT_MESSAGE.DELETE_BY_ID=DELETE FROM agent.chat_messages WHERE id = ?

MODEL.FIND_ALL=SELECT * FROM agent.supported_models ORDER BY provider_id, model_id
MODEL.FIND_ENABLED=SELECT * FROM agent.supported_models WHERE enabled = TRUE ORDER BY provider_id, model_id
MODEL.FIND_BY_ID=SELECT * FROM agent.supported_models WHERE provider_id = ? AND model_id = ?
MODEL.DELETE=DELETE FROM agent.supported_models WHERE provider_id = ? AND model_id = ?
MODEL.GET_KEY=SELECT encrypted_key, base_url FROM agent.supported_models WHERE provider_id = ? AND model_id = ?
MODEL.GET_KEY_FOR_PROVIDER=SELECT encrypted_key, base_url FROM agent.supported_models WHERE provider_id = ? AND encrypted_key IS NOT NULL LIMIT 1
MODEL.SET_ENABLED=UPDATE agent.supported_models SET enabled = :enabled WHERE provider_id = :providerID AND model_id = :modelId
MODEL.UPSERT=INSERT INTO agent.supported_models (provider_id, model_id, display_name, enabled, encrypted_key, base_url, model_kind, is_default, embedding_dimensions) VALUES (:providerID, :modelId, :displayName, :enabled, :encryptedKey, :baseUrl, :modelKind, :isDefault, :embeddingDimensions) ON CONFLICT (provider_id, model_id) DO UPDATE SET display_name = COALESCE(EXCLUDED.display_name, agent.supported_models.display_name), enabled = EXCLUDED.enabled, encrypted_key = COALESCE(EXCLUDED.encrypted_key, agent.supported_models.encrypted_key), base_url = COALESCE(EXCLUDED.base_url, agent.supported_models.base_url), model_kind = EXCLUDED.model_kind, embedding_dimensions = COALESCE(EXCLUDED.embedding_dimensions, agent.supported_models.embedding_dimensions)
MODEL.FIND_BY_KIND=SELECT * FROM agent.supported_models WHERE model_kind = ? ORDER BY provider_id, model_id
MODEL.FIND_EMBEDDING_DEFAULT=SELECT * FROM agent.supported_models WHERE model_kind = 'embedding' AND is_default = TRUE AND enabled = TRUE LIMIT 1
MODEL.CLEAR_DEFAULT_FOR_KIND=UPDATE agent.supported_models SET is_default = FALSE WHERE model_kind = :modelKind
MODEL.SET_DEFAULT=UPDATE agent.supported_models SET is_default = TRUE WHERE provider_id = :providerID AND model_id = :modelId AND model_kind = :modelKind

TOOL_EMBEDDING.ALL_IDS=SELECT tool_id FROM agent.agent_tool_embeddings
TOOL_EMBEDDING.FIND_HASH=SELECT content_hash, model_provider, model_id, dimensions FROM agent.agent_tool_embeddings WHERE tool_id = ?
TOOL_EMBEDDING.DELETE=DELETE FROM agent.agent_tool_embeddings WHERE tool_id = :toolId
TOOL_EMBEDDING.TRUNCATE=DELETE FROM agent.agent_tool_embeddings
TOOL_EMBEDDING.UPSERT=INSERT INTO agent.agent_tool_embeddings (tool_id, model_provider, model_id, dimensions, content_hash, embedding, updated_at) VALUES (:toolId, :modelProvider, :modelId, :dimensions, :contentHash, CAST(:embedding AS vector), :updatedAt) ON CONFLICT (tool_id) DO UPDATE SET model_provider = EXCLUDED.model_provider, model_id = EXCLUDED.model_id, dimensions = EXCLUDED.dimensions, content_hash = EXCLUDED.content_hash, embedding = EXCLUDED.embedding, updated_at = EXCLUDED.updated_at
TOOL_EMBEDDING.SEARCH_TOPK=SELECT tool_id, 1 - (embedding <=> CAST(:queryEmbedding AS vector)) AS similarity FROM agent.agent_tool_embeddings WHERE model_provider = :modelProvider AND model_id = :modelId AND dimensions = :dimensions ORDER BY embedding <=> CAST(:queryEmbedding AS vector) ASC LIMIT :topK

