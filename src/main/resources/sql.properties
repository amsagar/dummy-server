WORKFLOW_PROPOSAL.INSERT=INSERT INTO agent.workflow_proposals (id, session_id, turn_id, user_id, status, reason, confidence, intent_signature, trace_ref, user_prompt, model_provider_id, model_id, proposed_workflow_json, matched_tool_names_json, decision_comment, decided_by, decided_at, materialized_def_id, error_message, created_at, updated_at) VALUES (:id, :sessionId, :turnId, :userId, :status, :reason, :confidence, :intentSignature, :traceRef, :userPrompt, :modelProviderId, :modelId, CAST(:proposedWorkflowJson AS jsonb), CAST(:matchedToolNamesJson AS jsonb), :decisionComment, :decidedBy, :decidedAt, :materializedDefId, :errorMessage, :createdAt, :updatedAt)
WORKFLOW_PROPOSAL.UPDATE=UPDATE agent.workflow_proposals SET status = :status, reason = :reason, confidence = :confidence, intent_signature = :intentSignature, trace_ref = :traceRef, user_prompt = :userPrompt, model_provider_id = :modelProviderId, model_id = :modelId, proposed_workflow_json = CAST(:proposedWorkflowJson AS jsonb), matched_tool_names_json = CAST(:matchedToolNamesJson AS jsonb), decision_comment = :decisionComment, decided_by = :decidedBy, decided_at = :decidedAt, materialized_def_id = :materializedDefId, error_message = :errorMessage, updated_at = :updatedAt WHERE id = :id
