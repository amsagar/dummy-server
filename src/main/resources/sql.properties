WORKFLOW_API_KEY.LIST_REFERENCING_DEF=SELECT * FROM agent.workflow_api_key WHERE process_def_ids LIKE :likePattern
WORKFLOW_API_KEY.SET_SCOPE=UPDATE agent.workflow_api_key SET process_def_ids = :processDefIds WHERE id = :id
WORKFLOW_API_KEY.PURGE=DELETE FROM agent.workflow_api_key WHERE id = :id AND owner_id = :ownerId AND revoked_at IS NOT NULL
WORKFLOW_API_KEY.REVOKE=UPDATE agent.workflow_api_key SET revoked_at = :revokedAt WHERE id = :id AND owner_id = :ownerId AND revoked_at IS NULL
WORKFLOW_API_KEY.TOUCH_LAST_USED=UPDATE agent.workflow_api_key SET last_used_at = :lastUsedAt WHERE id = :id
WORKFLOW_API_KEY.ROTATE=UPDATE agent.workflow_api_key SET key_prefix = :keyPrefix, key_hash = :keyHash, last_used_at = NULL WHERE id = :id AND owner_id = :ownerId AND revoked_at IS NULL
WORKFLOW_API_KEY.UPDATE=UPDATE agent.workflow_api_key SET name = :name, process_def_ids = :processDefIds WHERE id = :id AND owner_id = :ownerId AND revoked_at IS NULL

WORKFLOW_ACTIVITY_PIN.UPSERT=INSERT INTO agent.activity_pin (id, def_id, activity_def_id, pinned_output, created_at, updated_at, created_by) VALUES (:id, :defId, :activityDefId, CAST(:pinnedOutput AS jsonb), :createdAt, :updatedAt, :createdBy) ON CONFLICT (def_id, activity_def_id) DO UPDATE SET pinned_output = EXCLUDED.pinned_output, updated_at = EXCLUDED.updated_at, created_by = EXCLUDED.created_by
WORKFLOW_ACTIVITY_PIN.FIND_BY_DEF=SELECT id, def_id, activity_def_id, pinned_output::text AS pinned_output, created_at, updated_at, created_by FROM agent.activity_pin WHERE def_id = :defId
WORKFLOW_ACTIVITY_PIN.FIND_ONE=SELECT id, def_id, activity_def_id, pinned_output::text AS pinned_output, created_at, updated_at, created_by FROM agent.activity_pin WHERE def_id = :defId AND activity_def_id = :activityDefId
WORKFLOW_ACTIVITY_PIN.DELETE=DELETE FROM agent.activity_pin WHERE def_id = :defId AND activity_def_id = :activityDefId

