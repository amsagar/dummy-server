# ----------------------------------------------------------------------------
# Joget-style workflow engine (added by Phase 1 of the Joget engine port).
# Tables defined in src/main/resources/db/joget_workflow.sql.
# ----------------------------------------------------------------------------
WORKFLOW_PROCESS_DEF.UPSERT=INSERT INTO agent.process_def (id, name, version, package_id, description, xpdl_json, created_at, updated_at) VALUES (:id, :name, :version, :packageId, :description, CAST(:xpdlJson AS jsonb), :createdAt, :updatedAt) ON CONFLICT (name, version) DO UPDATE SET package_id = EXCLUDED.package_id, description = EXCLUDED.description, xpdl_json = EXCLUDED.xpdl_json, updated_at = EXCLUDED.updated_at
WORKFLOW_PROCESS_DEF.FIND_BY_ID=SELECT * FROM agent.process_def WHERE id = :id
WORKFLOW_PROCESS_DEF.FIND_ALL=SELECT * FROM agent.process_def ORDER BY updated_at DESC
WORKFLOW_PROCESS_DEF.FIND_BY_NAME=SELECT * FROM agent.process_def WHERE name = :name ORDER BY updated_at DESC
WORKFLOW_PROCESS_DEF.DELETE_BY_ID=DELETE FROM agent.process_def WHERE id = :id

# --- Phase C metadata aggregation -------------------------------------------
# Bumps the all-time counters and recomputes derived columns (success_rate,
# avg_latency_ms) atomically. CAST around aiNodesJson keeps the param NULL-able
# without breaking jsonb inference.
WORKFLOW_PROCESS_DEF.RECORD_RUN=UPDATE agent.process_def SET total_runs = total_runs + 1, total_successes = total_successes + :successDelta, total_latency_ms = total_latency_ms + :latency, success_rate = (total_successes + :successDelta)::real / (total_runs + 1)::real, avg_latency_ms = (total_latency_ms + :latency) / GREATEST(total_runs + 1, 1), last_run_at = :endedAt, ai_nodes_json = CAST(:aiNodesJson AS jsonb), updated_at = :endedAt WHERE id = :defId
WORKFLOW_PROCESS_DEF.METADATA_BY_ID=SELECT total_runs, total_successes, total_latency_ms, success_rate, avg_latency_ms, ai_nodes_json, last_run_at FROM agent.process_def WHERE id = :id
# Aggregates only the ai_reasoning activities that ACTUALLY ran (state=complete)
# so that invokeWhen-skipped nodes don't inflate the count.
WORKFLOW_PROCESS_DEF.AI_NODES_FOR_DEF=SELECT ai.activity_def_id AS activity_def_id, COUNT(*) AS c FROM agent.activity_inst ai JOIN agent.process_inst pi ON ai.inst_id = pi.id WHERE pi.def_id = :defId AND ai.type = 'ai_reasoning' AND ai.state = 'complete' GROUP BY ai.activity_def_id ORDER BY c DESC

WORKFLOW_PROCESS_DEF_RUNS_RECENT.INSERT=INSERT INTO agent.process_def_runs_recent (def_id, run_id, succeeded, latency_ms, completed_at) VALUES (:defId, :runId, :succeeded, :latency, :completedAt) ON CONFLICT (run_id) DO NOTHING
# Trims the rolling window for one definition back to the most recent :keep rows.
WORKFLOW_PROCESS_DEF_RUNS_RECENT.TRIM=DELETE FROM agent.process_def_runs_recent WHERE def_id = :defId AND run_id NOT IN (SELECT run_id FROM agent.process_def_runs_recent WHERE def_id = :defId ORDER BY completed_at DESC LIMIT :keep)
WORKFLOW_PROCESS_DEF_RUNS_RECENT.WINDOW_STATS=SELECT COUNT(*) AS runs, COUNT(*) FILTER (WHERE succeeded) AS successes, COALESCE(AVG(latency_ms)::bigint, 0) AS avg_latency_ms, COALESCE(MAX(completed_at), 0) AS last_run_at FROM agent.process_def_runs_recent WHERE def_id = :defId
# Best-effort embedding check. Wrapped in to_regclass so it stays safe when
# pgvector is unavailable (the column won't exist; the query returns NULL).
WORKFLOW_PROCESS_DEF.HAS_EMBEDDING=SELECT (embedding IS NOT NULL) AS has_emb FROM agent.process_def WHERE id = :id

WORKFLOW_PROCESS_INST.INSERT=INSERT INTO agent.process_inst (id, def_id, state, started_at, ended_at, requester_id, parent_inst_id, due_at, error_class, error_message) VALUES (:id, :defId, :state, :startedAt, :endedAt, :requesterId, :parentInstId, :dueAt, :errorClass, :errorMessage)
WORKFLOW_PROCESS_INST.UPDATE_STATE=UPDATE agent.process_inst SET state = :state, ended_at = :endedAt, error_class = :errorClass, error_message = :errorMessage WHERE id = :id
WORKFLOW_PROCESS_INST.UPDATE_RESULT=UPDATE agent.process_inst SET result_json = :resultJson WHERE id = :id
WORKFLOW_PROCESS_INST.FIND_BY_ID=SELECT * FROM agent.process_inst WHERE id = :id
WORKFLOW_PROCESS_INST.FIND_BY_DEF_ID=SELECT * FROM agent.process_inst WHERE def_id = :defId ORDER BY started_at DESC NULLS LAST, id DESC LIMIT :limit OFFSET :offset
WORKFLOW_PROCESS_INST.COUNT_BY_DEF_ID=SELECT COUNT(*) FROM agent.process_inst WHERE def_id = :defId
WORKFLOW_PROCESS_INST.DELETE_BY_DEF_ID=DELETE FROM agent.process_inst WHERE def_id = :defId
WORKFLOW_PROCESS_INST.COUNT_ALL=SELECT COUNT(*) FROM agent.process_inst
WORKFLOW_PROCESS_INST.STATUS_COUNTS=SELECT state, COUNT(*) AS c FROM agent.process_inst GROUP BY state ORDER BY c DESC
WORKFLOW_PROCESS_INST.FIND_ALL=SELECT * FROM agent.process_inst ORDER BY started_at DESC NULLS LAST, id DESC LIMIT :limit OFFSET :offset
WORKFLOW_PROCESS_INST.LIST_FILTERED=SELECT * FROM agent.process_inst WHERE (CAST(:state AS TEXT) IS NULL OR state = CAST(:state AS TEXT)) AND (CAST(:stateLike AS TEXT) IS NULL OR state LIKE CAST(:stateLike AS TEXT)) AND (CAST(:defId AS TEXT) IS NULL OR def_id = CAST(:defId AS TEXT)) AND (CAST(:requesterLike AS TEXT) IS NULL OR requester_id ILIKE CAST(:requesterLike AS TEXT)) AND (CAST(:fromTs AS BIGINT) IS NULL OR started_at >= CAST(:fromTs AS BIGINT)) AND (CAST(:toTs AS BIGINT) IS NULL OR started_at <= CAST(:toTs AS BIGINT)) ORDER BY started_at DESC NULLS LAST, id DESC LIMIT :limit OFFSET :offset
WORKFLOW_PROCESS_INST.COUNT_FILTERED=SELECT COUNT(*) FROM agent.process_inst WHERE (CAST(:state AS TEXT) IS NULL OR state = CAST(:state AS TEXT)) AND (CAST(:stateLike AS TEXT) IS NULL OR state LIKE CAST(:stateLike AS TEXT)) AND (CAST(:defId AS TEXT) IS NULL OR def_id = CAST(:defId AS TEXT)) AND (CAST(:requesterLike AS TEXT) IS NULL OR requester_id ILIKE CAST(:requesterLike AS TEXT)) AND (CAST(:fromTs AS BIGINT) IS NULL OR started_at >= CAST(:fromTs AS BIGINT)) AND (CAST(:toTs AS BIGINT) IS NULL OR started_at <= CAST(:toTs AS BIGINT))
WORKFLOW_INSIGHTS.SUMMARY=SELECT COUNT(*) AS total, SUM(CASE WHEN state IN ('closed.terminated','closed.aborted') THEN 1 ELSE 0 END) AS failed, SUM(CASE WHEN state = 'closed.completed' THEN 1 ELSE 0 END) AS completed, percentile_cont(0.5) WITHIN GROUP (ORDER BY (ended_at - started_at)) FILTER (WHERE ended_at IS NOT NULL AND started_at IS NOT NULL) AS p50_ms, percentile_cont(0.95) WITHIN GROUP (ORDER BY (ended_at - started_at)) FILTER (WHERE ended_at IS NOT NULL AND started_at IS NOT NULL) AS p95_ms, percentile_cont(0.99) WITHIN GROUP (ORDER BY (ended_at - started_at)) FILTER (WHERE ended_at IS NOT NULL AND started_at IS NOT NULL) AS p99_ms FROM agent.process_inst WHERE started_at >= :fromTs AND started_at < :toTs
WORKFLOW_INSIGHTS.BY_DAY=SELECT to_char(to_timestamp(started_at / 1000), 'YYYY-MM-DD') AS day, COUNT(*) AS total, SUM(CASE WHEN state IN ('closed.terminated','closed.aborted') THEN 1 ELSE 0 END) AS failed, SUM(CASE WHEN state = 'closed.completed' THEN 1 ELSE 0 END) AS completed, percentile_cont(0.5) WITHIN GROUP (ORDER BY (ended_at - started_at)) FILTER (WHERE ended_at IS NOT NULL AND started_at IS NOT NULL) AS p50_ms, percentile_cont(0.95) WITHIN GROUP (ORDER BY (ended_at - started_at)) FILTER (WHERE ended_at IS NOT NULL AND started_at IS NOT NULL) AS p95_ms FROM agent.process_inst WHERE started_at >= :fromTs AND started_at < :toTs GROUP BY day ORDER BY day
WORKFLOW_INSIGHTS.BY_WORKFLOW=SELECT pi.def_id AS def_id, pd.name AS name, COUNT(*) AS total, SUM(CASE WHEN pi.state IN ('closed.terminated','closed.aborted') THEN 1 ELSE 0 END) AS failed, SUM(CASE WHEN pi.state = 'closed.completed' THEN 1 ELSE 0 END) AS completed, percentile_cont(0.5) WITHIN GROUP (ORDER BY (pi.ended_at - pi.started_at)) FILTER (WHERE pi.ended_at IS NOT NULL AND pi.started_at IS NOT NULL) AS p50_ms, percentile_cont(0.95) WITHIN GROUP (ORDER BY (pi.ended_at - pi.started_at)) FILTER (WHERE pi.ended_at IS NOT NULL AND pi.started_at IS NOT NULL) AS p95_ms, COALESCE(MAX(pd.time_saved_seconds_per_run), 0) AS time_saved_seconds_per_run FROM agent.process_inst pi LEFT JOIN agent.process_def pd ON pd.id = pi.def_id WHERE pi.started_at >= :fromTs AND pi.started_at < :toTs GROUP BY pi.def_id, pd.name ORDER BY total DESC LIMIT :limit
WORKFLOW_INSIGHTS.HOTSPOTS=SELECT activity_def_id, plugin_name, COUNT(*) AS failures, MAX(error_class) AS last_error_class, MAX(error_message) AS last_error_message FROM agent.activity_inst WHERE state IN ('failed','deadline_breached','cancelled') AND started_at >= :fromTs AND started_at < :toTs GROUP BY activity_def_id, plugin_name ORDER BY failures DESC LIMIT :limit

WORKFLOW_PENDING_APPROVAL.INSERT=INSERT INTO agent.pending_approval (id, inst_id, activity_inst_id, activity_def_id, requested_by, requested_at, reason) VALUES (:id, :instId, :activityInstId, :activityDefId, :requestedBy, :requestedAt, :reason)
WORKFLOW_PENDING_APPROVAL.FIND_PENDING=SELECT pa.*, pi.def_id AS def_id, pd.name AS workflow_name FROM agent.pending_approval pa LEFT JOIN agent.process_inst pi ON pi.id = pa.inst_id LEFT JOIN agent.process_def pd ON pd.id = pi.def_id WHERE pa.decided_at IS NULL ORDER BY pa.requested_at DESC LIMIT :limit
