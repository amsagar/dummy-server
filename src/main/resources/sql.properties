WORKFLOW_PROCESS_INST.LOAD_CHECKPOINT=SELECT worklist_json, join_state_json, checkpoint_at FROM agent.process_inst WHERE id = :id

WORKFLOW_ACTIVITY_INST.INSERT=INSERT INTO agent.activity_inst (id, inst_id, activity_def_id, type, state, started_at, ended_at, due_at, assignee, attempt, plugin_name, input_snapshot, output_snapshot, error_class, error_message) VALUES (:id, :instId, :activityDefId, :type, :state, :startedAt, :endedAt, :dueAt, :assignee, :attempt, :pluginName, CAST(:inputSnapshot AS jsonb), CAST(:outputSnapshot AS jsonb), :errorClass, :errorMessage)
WORKFLOW_ACTIVITY_INST.UPDATE_STATE=UPDATE agent.activity_inst SET state = :state, ended_at = :endedAt, output_snapshot = CAST(:outputSnapshot AS jsonb), error_class = :errorClass, error_message = :errorMessage WHERE id = :id
WORKFLOW_ACTIVITY_INST.FIND_BY_INST_ID=SELECT * FROM agent.activity_inst WHERE inst_id = :instId ORDER BY started_at ASC NULLS LAST, id
WORKFLOW_ACTIVITY_INST.FAILURE_HOTSPOTS=SELECT activity_def_id, COUNT(*) AS c FROM agent.activity_inst WHERE state = 'failed' GROUP BY activity_def_id ORDER BY c DESC LIMIT :limit
WORKFLOW_ACTIVITY_INST.PERFORMANCE_METRICS=SELECT activity_def_id, AVG((COALESCE(ended_at, started_at) - started_at)) AS avg_duration_ms, COUNT(*) AS executions FROM agent.activity_inst WHERE started_at IS NOT NULL GROUP BY activity_def_id ORDER BY avg_duration_ms DESC NULLS LAST LIMIT :limit
WORKFLOW_ACTIVITY_INST.TYPE_COUNTS=SELECT type, COUNT(*) AS c FROM agent.activity_inst GROUP BY type ORDER BY c DESC
WORKFLOW_ACTIVITY_INST.RETRY_AND_TIMEOUT_STATS=SELECT (SELECT COUNT(*) FROM agent.activity_inst WHERE error_class = 'TIMEOUT') AS timeout_count, (SELECT COUNT(*) FROM agent.audit_trail WHERE action = 'activity.failed' AND COALESCE((payload_json->>'retrying')::boolean, false) = true) AS retried_count
WORKFLOW_ACTIVITY_INST.FIND_BREACHED_DEADLINES=SELECT id, inst_id, due_at FROM agent.activity_inst WHERE state = 'running' AND due_at IS NOT NULL AND due_at < :now
WORKFLOW_ACTIVITY_INST.MARK_DEADLINE_BREACHED=UPDATE agent.activity_inst SET state = 'deadline_breached', ended_at = :endedAt, error_class = 'TIMEOUT', error_message = 'deadline breached' WHERE id = :id AND state = 'running'

