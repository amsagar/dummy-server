WORKFLOW_PENDING_APPROVAL.FIND_BY_INST=SELECT * FROM agent.pending_approval WHERE inst_id = :instId AND decided_at IS NULL ORDER BY requested_at DESC LIMIT 1
WORKFLOW_PENDING_APPROVAL.DECIDE=UPDATE agent.pending_approval SET decided_by = :decidedBy, decided_at = :decidedAt, decision = :decision, comment = :comment WHERE id = :id AND decided_at IS NULL
WORKFLOW_PENDING_APPROVAL.COUNT_PENDING=SELECT COUNT(*) FROM agent.pending_approval WHERE decided_at IS NULL

WORKFLOW_API_KEY.INSERT=INSERT INTO agent.workflow_api_key (id, name, key_prefix, key_hash, owner_id, process_def_ids, created_at) VALUES (:id, :name, :keyPrefix, :keyHash, :ownerId, :processDefIds, :createdAt)
