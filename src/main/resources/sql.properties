MEMORY.INSERT=INSERT INTO agent.memories (id, user_id, session_id, category, memory_file_path, content, tags, created_at, updated_at) VALUES (:id, :userId, :sessionId, :category, :memoryFilePath, :content, :tags, :createdAt, :updatedAt)
