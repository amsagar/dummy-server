COST_USAGE.INSERT=INSERT INTO agent.cost_usage (id, session_id, turn_id, provider_id, model_id, prompt_tokens, completion_tokens, total_tokens, estimated_cost_usd, created_at) VALUES (:id, :sessionId, :turnId, :providerId, :modelId, :promptTokens, :completionTokens, :totalTokens, :estimatedCostUsd, :createdAt)
