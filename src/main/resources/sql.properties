WORKFLOW_PROPOSAL.FIND_BY_SESSION_TURN=SELECT * FROM agent.workflow_proposals WHERE session_id = :sessionId AND turn_id = :turnId LIMIT 1
WORKFLOW_PROPOSAL.FIND_PENDING_BY_USER=SELECT * FROM agent.workflow_proposals WHERE user_id = :userId AND status = 'pending' ORDER BY created_at DESC
WORKFLOW_PROPOSAL.FIND_ACTIVE_BY_USER=SELECT * FROM agent.workflow_proposals WHERE user_id = :userId AND status IN ('pending','approved','materialized','rejected') ORDER BY created_at DESC
WORKFLOW_PROPOSAL.FIND_MATERIALIZED_BY_USER=SELECT * FROM agent.workflow_proposals WHERE user_id = :userId AND status = 'materialized' AND materialized_def_id IS NOT NULL ORDER BY updated_at DESC
