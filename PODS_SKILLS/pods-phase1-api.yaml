openapi: "3.0.1"
info:
  title: "PODS Order Validation API — Phase 1"
  description: "Phase 1 read-only tools for order validation. Agent monitors and reports, no automated changes. Base URL: http://localhost:3001"
  version: "1.0.0"
servers:
  - url: "http://localhost:3001"

paths:

  # ─────────────────────────────────────────────
  # ORDER DATA — DaaS / Salesforce CPQ
  # ─────────────────────────────────────────────

  /daas/orders/{id}:
    get:
      tags: ["Order Data"]
      summary: "GetOrder"
      description: "Get order header — customer, legal entity, service type, container size, billing code"
      operationId: "GetOrder"
      parameters:
        - name: id
          in: path
          required: true
          description: "Order ID (e.g. 10045)"
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Order details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: "Order not found"

  /daas/orders/{id}/lines:
    get:
      tags: ["Order Data"]
      summary: "GetOrderLines"
      description: "Get all order lines — SKUs, billing codes, auto-renew flags, line statuses (Booked/Invoiced)"
      operationId: "GetOrderLines"
      parameters:
        - name: id
          in: path
          required: true
          description: "Order ID"
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Order lines"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderLine"
        "404":
          description: "Order not found"

  /daas/orders/{id}/legs:
    get:
      tags: ["Order Data"]
      summary: "GetOrderLegs"
      description: "Get all service legs — IDEL, FPU, WRT, etc. with completion timestamps and sequence"
      operationId: "GetOrderLegs"
      parameters:
        - name: id
          in: path
          required: true
          description: "Order ID"
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Service legs"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderLeg"
        "404":
          description: "Order not found"

  /daas/orders/{id}/timeline:
    get:
      tags: ["Order Data"]
      summary: "GetOrderTimeline"
      description: "Get full chronological event history for an order across all systems"
      operationId: "GetOrderTimeline"
      parameters:
        - name: id
          in: path
          required: true
          description: "Order ID"
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Timeline events"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"
        "404":
          description: "Order not found"

  /daas/containers/{id}:
    get:
      tags: ["Order Data"]
      summary: "GetContainer"
      description: "Get container details — size, on-rent status, custody, physical location"
      operationId: "GetContainer"
      parameters:
        - name: id
          in: path
          required: true
          description: "Container ID (e.g. C-88234)"
          schema:
            type: string
      responses:
        "200":
          description: "Container details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Container"
        "404":
          description: "Container not found"

  /daas/cases:
    get:
      tags: ["Order Data"]
      summary: "GetCasesByOrder"
      description: "Get all Salesforce cases linked to an order"
      operationId: "GetCasesByOrder"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Cases"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"

  # ─────────────────────────────────────────────
  # BILLING — D365 F&O
  # ─────────────────────────────────────────────

  /d365/orders/{id}:
    get:
      tags: ["Billing"]
      summary: "CheckD365OrderStatus"
      description: "Check order sync state in D365 — whether FPU was received and invoicing status"
      operationId: "CheckD365OrderStatus"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "D365 order status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/D365OrderStatus"

  /d365/saleslines:
    get:
      tags: ["Billing"]
      summary: "CheckD365InvoiceLines"
      description: "Get DBO_SALESLINE records — checks Booked vs Invoiced status and auto-renew flags"
      operationId: "CheckD365InvoiceLines"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Invoice lines"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/D365InvoiceLine"

  /d365/rent:
    get:
      tags: ["Billing"]
      summary: "CheckRentGeneration"
      description: "Check active rental lines and auto-renew flag state. Detects post-FPU overbilling."
      operationId: "CheckRentGeneration"
      parameters:
        - name: containerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Rent generation status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentGenerationStatus"

  /d365/billing/anniversary:
    get:
      tags: ["Billing"]
      summary: "CheckBillingAnniversary"
      description: "Get next anniversary date and billing cliff window. Flags risk if FPU done but auto-renew still active."
      operationId: "CheckBillingAnniversary"
      parameters:
        - name: containerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Anniversary and billing cliff"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingAnniversary"

  # ─────────────────────────────────────────────
  # SCHEDULING — RBMS
  # ─────────────────────────────────────────────

  /rbms/moves:
    get:
      tags: ["Scheduling"]
      summary: "CheckRBMSMove"
      description: "Get scheduled and completed moves for an order"
      operationId: "CheckRBMSMove"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Move records"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /rbms/calendar:
    get:
      tags: ["Scheduling"]
      summary: "CheckRBMSCalendar"
      description: "Get driver calendar for a container. Detects duplicate jobs, ghost entries, and unremoved cancellations."
      operationId: "CheckRBMSCalendar"
      parameters:
        - name: containerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Calendar entries"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RBMSCalendar"

  /rbms/sync:
    get:
      tags: ["Scheduling"]
      summary: "CheckSyncStatus"
      description: "Check integration sync lag between RBMS and Salesforce/D365"
      operationId: "CheckSyncStatus"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Sync status"
          content:
            application/json:
              schema:
                type: object

  # ─────────────────────────────────────────────
  # FIELD OPS — POET
  # ─────────────────────────────────────────────

  /poet/legs:
    get:
      tags: ["Field Ops"]
      summary: "GetPOETTimestamps"
      description: "Get leg completion timestamps recorded by drivers. Includes propagation status to Salesforce and D365."
      operationId: "GetPOETTimestamps"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "POET timestamps"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/POETTimestamp"

  /poet/errors:
    get:
      tags: ["Field Ops"]
      summary: "GetErrorLogs"
      description: "Get system error logs for an order (e.g. integration timeouts, D365 sync failures)"
      operationId: "GetErrorLogs"
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Error logs"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorLog"

  # ─────────────────────────────────────────────
  # CONTAINER LOCATION — PodHunter
  # ─────────────────────────────────────────────

  /podhunter/containers/{id}/location:
    get:
      tags: ["Container Location"]
      summary: "GetContainerLocation"
      description: "Get physical location, custody state, and storage center for a container"
      operationId: "GetContainerLocation"
      parameters:
        - name: id
          in: path
          required: true
          description: "Container ID"
          schema:
            type: string
      responses:
        "200":
          description: "Container location"
          content:
            application/json:
              schema:
                type: object

  /podhunter/containers/{id}/assignment:
    get:
      tags: ["Container Location"]
      summary: "CheckGhostAssignment"
      description: "Detect ghost assignments — container still linked to a previous customer after FPU"
      operationId: "CheckGhostAssignment"
      parameters:
        - name: id
          in: path
          required: true
          description: "Container ID"
          schema:
            type: string
      responses:
        "200":
          description: "Assignment check"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhostAssignmentCheck"

  # ─────────────────────────────────────────────
  # APPOINTMENTS — Cheetah
  # ─────────────────────────────────────────────

  /cheetah/pickup-status:
    get:
      tags: ["Appointments"]
      summary: "CheckScheduledPickup"
      description: "Check if FPU is scheduled and confirmed. Used by Anniversary Sentinel to detect billing cliff risk."
      operationId: "CheckScheduledPickup"
      parameters:
        - name: containerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Pickup status"
          content:
            application/json:
              schema:
                type: object

  # ─────────────────────────────────────────────
  # KNOWLEDGE BASE
  # ─────────────────────────────────────────────

  /kb/similar-cases:
    get:
      tags: ["Knowledge Base"]
      summary: "GetSimilarCases"
      description: "Get historical cases with the same error pattern to recommend resolution path"
      operationId: "GetSimilarCases"
      parameters:
        - name: type
          in: query
          required: true
          description: "Issue type (e.g. 'Post-FPU Auto-Renew', 'Ghost Assignment', 'D365 Sync Failure')"
          schema:
            type: string
      responses:
        "200":
          description: "Similar cases"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

# ─────────────────────────────────────────────
# SCHEMAS
# ─────────────────────────────────────────────

components:
  schemas:

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
        serviceType:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        accountType:
          type: string
        legalEntity:
          type: string
        marketCode:
          type: string
        billingCode:
          type: string
        containerSize:
          type: string
        containerId:
          type: string
        jobSiteAddress:
          $ref: "#/components/schemas/Address"
        quoteId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderLine:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: integer
        lineIdentity:
          type: string
        productFamily:
          type: string
        itemCode:
          type: string
        sku:
          type: string
        billingCode:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        status:
          type: string
          enum: [Booked, Invoiced]
        autoRenew:
          type: boolean
        containerId:
          type: string

    OrderLeg:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: integer
        legCode:
          type: string
          enum: [IDEL, FPU, WRT, RDL, MOV, WTW, SID, SFP]
        legName:
          type: string
        status:
          type: string
        scheduledDate:
          type: string
        completedDate:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
          nullable: true
        driverId:
          type: string
        parentLegId:
          type: string
          nullable: true
        sequence:
          type: integer

    Container:
      type: object
      properties:
        id:
          type: string
        size:
          type: string
        status:
          type: string
        onRent:
          type: boolean
        currentCustomerId:
          type: integer
        currentOrderId:
          type: integer
        physicalLocation:
          type: string
        custody:
          type: string
          enum: [Customer, Warehouse]

    TimelineEvent:
      type: object
      properties:
        event:
          type: string
        timestamp:
          type: string
          format: date-time
        system:
          type: string
        actor:
          type: string

    Case:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: integer
        type:
          type: string
        status:
          type: string
        subject:
          type: string
        priority:
          type: string
        createdAt:
          type: string
          format: date-time

    D365OrderStatus:
      type: object
      properties:
        orderId:
          type: string
        d365SyncStatus:
          type: string
        lastSyncedAt:
          type: string
          format: date-time
        invoicingStatus:
          type: string
        fpuReceivedByD365:
          type: boolean
        notes:
          type: string

    D365InvoiceLine:
      type: object
      properties:
        lineId:
          type: string
        orderId:
          type: integer
        containerId:
          type: string
        status:
          type: string
          enum: [Booked, Invoiced]
        autoRenew:
          type: boolean
        quantity:
          type: integer
        unitPrice:
          type: number
        lastUpdated:
          type: string
          format: date-time

    RentGenerationStatus:
      type: object
      properties:
        containerId:
          type: string
        activeRentalLines:
          type: integer
        autoRenewActive:
          type: boolean
        lastRentGeneratedDate:
          type: string
          format: date-time
        nextRentGenerationDate:
          type: string
          format: date-time
        fpuRecorded:
          type: boolean
        fpuDate:
          type: string
        warning:
          type: string

    BillingAnniversary:
      type: object
      properties:
        containerId:
          type: string
        rentAnniversaryDate:
          type: string
        billingCliffWindowStart:
          type: string
          format: date-time
        daysUntilAnniversary:
          type: integer
        fpuCompleted:
          type: boolean
        fpuDate:
          type: string
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        riskReason:
          type: string

    RBMSCalendar:
      type: object
      properties:
        containerId:
          type: string
        calendarEntries:
          type: array
          items:
            type: object
        duplicatesFound:
          type: integer
        ghostEntriesFound:
          type: integer

    POETTimestamp:
      type: object
      properties:
        legId:
          type: string
        orderId:
          type: integer
        legCode:
          type: string
        poetTimestamp:
          type: string
          format: date-time
        recordedBy:
          type: string
        propagatedToSalesforce:
          type: boolean
        propagatedToD365:
          type: boolean
        salesforceTimestamp:
          type: string
          format: date-time
          nullable: true
        d365Timestamp:
          type: string
          format: date-time
          nullable: true
        warning:
          type: string

    ErrorLog:
      type: object
      properties:
        logId:
          type: string
        orderId:
          type: integer
        timestamp:
          type: string
          format: date-time
        system:
          type: string
        errorCode:
          type: string
        message:
          type: string
        resolved:
          type: boolean

    GhostAssignmentCheck:
      type: object
      properties:
        containerId:
          type: string
        podhunterAssignedCustomerId:
          type: integer
        onRentInPodHunter:
          type: boolean
        activeOrderInSalesforce:
          type: boolean
        mismatch:
          type: boolean
        warning:
          type: string

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        addressType:
          type: string
          enum: [Residential, Commercial]
